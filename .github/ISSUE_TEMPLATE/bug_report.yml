name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Hold alt+space
        2. Say "..."
        3. Release
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: shout version
      placeholder: e.g. 0.1.0 (Settings, or the release you downloaded)
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. 15.1, Apple Silicon
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Terminal output if running via `npm run tauri dev`, or Console.app logs for the bundled app.
      render: shell
    validations:
      required: false
