<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>shout pill</title>
    <style>
      html, body { margin: 0; background: transparent; overflow: hidden; }
      #pill {
        display: flex;
        align-items: center;
        gap: 8px;
        height: 36px;
        margin: 6px auto;
        width: fit-content;
        max-width: 530px;
        padding: 0 16px;
        border-radius: 18px;
        background: rgba(20, 20, 24, 0.88);
        color: #eee;
        font: 600 13px -apple-system, BlinkMacSystemFont, sans-serif;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
      }
      #ptext {
        white-space: nowrap;
        overflow: hidden;
      }
      #pdot { width: 9px; height: 9px; border-radius: 50%; background: gray; }
      #pdot.recording, #pdot.ghost-recording { background: #ff4d4f; animation: pulse 1.2s infinite; }
      #pdot.transcribing, #pdot.cleaning, #pdot.injecting, #pdot.loading-model { background: #f5a623; }
      #pdot.ghost-processing { background: #a06cd5; }
      #pdot.error { background: #d0021b; }
      @keyframes pulse { 50% { opacity: 0.4; } }
    </style>
  </head>
  <body>
    <div id="pill"><span id="pdot"></span><span id="ptext">shout</span></div>
    <script>
      const labels = {
        "recording": "listening…",
        "transcribing": "transcribing…",
        "cleaning": "cleaning up…",
        "injecting": "typing…",
        "loading-model": "loading model…",
        "ghost-recording": "ghost capture on",
        "ghost-processing": "processing meeting…",
        "error": "error",
      };
      const pdot = document.getElementById("pdot");
      const ptext = document.getElementById("ptext");
      let partial = null;

      function render(state) {
        pdot.className = state;
        // While listening, show the live transcript tail instead of the label.
        if (state === "recording" && partial) {
          ptext.textContent = partial.length > 70 ? "…" + partial.slice(-69) : partial;
        } else {
          ptext.textContent = labels[state] ?? state;
        }
      }

      let lastState = "idle";
      window.__TAURI__.event.listen("shout:status", ({ payload }) => {
        lastState = payload.state;
        if (payload.state !== "recording") partial = null;
        render(payload.state);
      });
      window.__TAURI__.event.listen("shout:partial", ({ payload }) => {
        partial = payload.text;
        render(lastState);
      });
    </script>
  </body>
</html>
