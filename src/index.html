<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>shout</title>
  </head>
  <body>
    <main>
      <h1>shout</h1>
      <div id="status-row">
        <span id="dot" class="starting"></span>
        <span id="state">starting…</span>
      </div>
      <p id="detail"></p>
      <p class="hint">Hold <kbd id="hotkey">alt+space</kbd>, speak, release.</p>
      <section id="last" hidden>
        <h2>Last dictation</h2>
        <p class="label">raw</p>
        <p id="raw" class="text"></p>
        <p class="label">cleaned</p>
        <p id="cleaned" class="text"></p>
      </section>
    </main>
    <script src="main.js"></script>
  </body>
</html>
